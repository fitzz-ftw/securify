[testenv:py314]
ignore_outcome = true
# commands =
#     pytest --cov=fitzzftw.patch --cov-branch --cov-report=html:htmlcov/{envname} --cov-report=term-missing --cov-config=coverage_ge_314.toml


[testenv:py315]
ignore_outcome = true
# commands =
#     pytest --cov=fitzzftw.patch --cov-branch --cov-report=html:htmlcov/{envname} --cov-report=term-missing --cov-config=coverage_ge_314.toml


[testenv:lint]
description = Run ruff linter
extras = lint
commands = ruff check src

[testenv:build]
description = Build sdist and wheel for PyPI upload
skip_install = true
deps =
    build
    twine

commands =
    python -c 'import shutil; [shutil.rmtree(p, ignore_errors=True) for p in ["dist", "build"]]'
    python -m build
    twine check dist/*
