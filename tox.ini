[tox]
# Test-Matrix von 3.11 bis 3.15
envlist = py311, py312, py313, py314, py315
minversion = 4.0
isolated_build = True

[testenv]
passenv =
    SETUPTOOLS_SCM_PRETEND_VERSION
    GIT_AUTHOR_NAME
    GIT_AUTHOR_EMAIL
    GITHUB_*
    
description = Run pytest with dependencies from pyproject.toml
extras = 
    test
package = wheel
wheel_build_env = .pkg
commands =
    pytest --cov=securify --cov-branch --cov-report=html:htmlcov/{envname} --cov-report=term-missing

